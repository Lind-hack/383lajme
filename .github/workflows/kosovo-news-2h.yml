name: Kosovo News — Every Hour

on:
  schedule:
    - cron: '0 * * * *'   # every hour, 24/7
  workflow_dispatch:          # also triggerable manually from GitHub UI

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false   # queue new runs; never drop a scheduled hour

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write         # needed to git push the JSON articles back

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Python deps
        run: pip install feedparser requests beautifulsoup4 python-slugify python-dotenv

      - name: Run Kosovo pipeline
        env:
          GROQ_API_KEY:         ${{ secrets.GROQ_API_KEY }}
          GOOGLE_AI_API_KEY:    ${{ secrets.GOOGLE_AI_API_KEY }}
          GOOGLE_SEARCH_API_KEY: ${{ secrets.GOOGLE_SEARCH_API_KEY }}
          GOOGLE_CSE_ID:        ${{ secrets.GOOGLE_CSE_ID }}
          PEXELS_API_KEY:       ${{ secrets.PEXELS_API_KEY }}
          GMAIL_USER:           ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD:   ${{ secrets.GMAIL_APP_PASSWORD }}
          REMOVE_SECRET:        ${{ secrets.REMOVE_SECRET }}
          SITE_URL:             ${{ secrets.SITE_URL }}
        run: python -u scripts/kosovo_pipeline.py

      - name: Commit new articles
        id: commit
        run: |
          git config user.name "383 News Bot"
          git config user.email "bot@383news.com"
          git add data/auto-articles/
          if git diff --staged --quiet; then
            echo "Nothing to commit"
            echo "committed=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          git commit -m "chore: Kosovo news $(date -u +%Y-%m-%dT%H:%M)"
          # Pull any concurrent commits before pushing; theirs wins on data files
          git pull --rebase --autostash -X theirs origin main
          git push
          echo "committed=true" >> $GITHUB_OUTPUT

      - name: Trigger Vercel deploy
        if: steps.commit.outputs.committed == 'true' && secrets.VERCEL_DEPLOY_HOOK_URL != ''
        run: curl -sX POST "${{ secrets.VERCEL_DEPLOY_HOOK_URL }}"
