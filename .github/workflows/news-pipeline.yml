name: News Pipeline

on:
  schedule:
    - cron: '0 */2 * * *'  # every 2 hours
  workflow_dispatch:

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt
        working-directory: businesses/383

      - name: Run pipeline
        run: python scripts/pipeline.py
        working-directory: businesses/383
        env:
          GOOGLE_AI_API_KEY: ${{ secrets.GOOGLE_AI_API_KEY }}

      - name: Commit updated database
        run: |
          git config user.email "bot@383lajme.com"
          git config user.name "383 Bot"
          git add -f businesses/383/data/articles.db
          git diff --staged --quiet || git commit -m "chore: pipeline run $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
