name: News Pipeline

on:
  schedule:
    - cron: '37 */2 * * *'  # every 2 hours, away from top-of-hour Actions congestion
  workflow_dispatch:

jobs:
  pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run pipeline
        run: python scripts/pipeline.py
        env:
          GOOGLE_AI_API_KEY: ${{ secrets.GOOGLE_AI_API_KEY }}

      - name: Commit updated database
        id: commit
        run: |
          git config user.email "bot@383lajme.com"
          git config user.name "383 Bot"
          git add -f data/articles.db
          if git diff --staged --quiet; then
            echo "committed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "chore: pipeline run $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git pull --rebase origin main
            git push
            echo "committed=true" >> $GITHUB_OUTPUT
          fi

      - name: Trigger Vercel deploy
        if: steps.commit.outputs.committed == 'true'
        env:
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          if [ -n "$VERCEL_DEPLOY_HOOK_URL" ]; then
            curl -s -X POST "$VERCEL_DEPLOY_HOOK_URL" && echo "Vercel deploy triggered" || echo "Vercel deploy hook failed (non-fatal)"
          else
            echo "VERCEL_DEPLOY_HOOK_URL not set — relying on Vercel GitHub integration"
          fi
