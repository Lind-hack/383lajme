name: News Pipeline

on:
  # Disabled as a schedule: the production pipeline now runs from Codex Cloud
  # with GPT + last30days. Keep manual dispatch only for legacy debugging.
  workflow_dispatch:

jobs:
  pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run pipeline
        run: python scripts/pipeline.py
        env:
          GOOGLE_AI_API_KEY: ${{ secrets.GOOGLE_AI_API_KEY }}

      - name: Commit updated database
        run: |
          git config user.email "bot@383lajme.com"
          git config user.name "383 Bot"
          git add -f data/articles.db
          git diff --staged --quiet || (
            git commit -m "chore: pipeline run $(date -u +%Y-%m-%dT%H:%M:%SZ)" &&
            git pull --rebase origin main &&
            git push
          )
