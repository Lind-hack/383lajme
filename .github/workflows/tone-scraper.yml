name: Tone Scraper

on:
  schedule:
    - cron: "0 6 * * *"   # 6 AM UTC = 8 AM CEST
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install feedparser groq

      - name: Run tone scraper
        run: python tools/tone_scraper.py
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      - name: Commit updated tone data
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add public/tone-outlets.json
          git diff --cached --quiet || git commit -m "chore: update tone outlets data [skip ci]"
          git push
