name: Tone Scraper

on:
  schedule:
    - cron: "23 6 * * *"   # 6:23 AM UTC = 8:23 AM CEST, away from Actions peak load
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install feedparser groq

      - name: Run tone scraper
        run: python tools/tone_scraper.py
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      - name: Commit updated tone data
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add public/tone-outlets.json
          if git diff --cached --quiet; then
            echo "No tone data changes"
            exit 0
          fi
          git commit -m "chore: update tone outlets data [skip ci]"
          git pull --rebase --autostash origin main
          git push
