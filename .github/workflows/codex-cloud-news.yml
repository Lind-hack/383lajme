name: Codex Cloud News Pipeline

on:
  workflow_dispatch:
    inputs:
      cron_slot_label:
        description: "Kosovo-time slot that Vercel Cron dispatched, for example 2026-07-07 21:00 Kosovo time."
        required: false
        type: string
  schedule:
    # Backup clock for the hosted pipeline. GitHub can start scheduled jobs late,
    # but this keeps the automation running on Hobby Vercel accounts where
    # frequent Vercel Cron jobs are blocked.
    # Europe/Pristina summer time (UTC+2): 07,09,11,13,15,17,19,21,23.
    - cron: "0 5,7,9,11,13,15,17,19,21 * * *"

permissions:
  contents: write

concurrency:
  group: codex-cloud-news-pipeline
  cancel-in-progress: false

jobs:
  run:
    name: Run 383 Lajme cloud news pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 90

    env:
      # Kosovo/Pristina uses the same civil time as Europe/Belgrade.
      # "Europe/Pristina" is not present in every IANA tz database.
      TZ: Europe/Belgrade
      CODEX_MODEL: ${{ vars.CODEX_MODEL }}
      CODEX_AUTH_JSON_B64: ${{ secrets.CODEX_AUTH_JSON_B64 }}
      GITHUB_TOKEN: ${{ secrets.CODEX_PUSH_TOKEN || github.token }}
      GITHUB_REPOSITORY: Lind-hack/383lajme
      SITE_URL: ${{ secrets.SITE_URL }}
      VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
      GMAIL_USER: ${{ secrets.GMAIL_USER }}
      GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
      RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL || vars.RECIPIENT_EMAIL }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY || vars.RESEND_API_KEY }}
      EMAIL_FROM: ${{ secrets.EMAIL_FROM || vars.EMAIL_FROM }}
      REMOVE_SECRET: ${{ secrets.REMOVE_SECRET }}
      ADMIN_SECRET: ${{ secrets.ADMIN_SECRET || vars.ADMIN_SECRET }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SCRAPECREATORS_API_KEY: ${{ secrets.SCRAPECREATORS_API_KEY }}
      XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
      PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
      BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
      INCLUDE_SOURCES: ${{ secrets.INCLUDE_SOURCES || vars.INCLUDE_SOURCES }}
      REQUIRE_EMAIL_REPORT: "true"
      REQUESTED_CRON_SLOT_LABEL: ${{ github.event.inputs.cron_slot_label }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.CODEX_PUSH_TOKEN || github.token }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project dependencies
        run: |
          npm ci --no-audit --no-fund || npm install --no-audit --no-fund
          python -m pip install --upgrade pip
          python -m pip install feedparser requests beautifulsoup4 python-slugify python-dotenv yt-dlp Pillow

      - name: Install last30days skill
        run: |
          mkdir -p ~/.codex/skills
          rm -rf /tmp/last30days-skill ~/.codex/skills/last30days
          git clone --depth 1 https://github.com/mvanhorn/last30days-skill /tmp/last30days-skill
          cp -R /tmp/last30days-skill/skills/last30days ~/.codex/skills/last30days
          python3 ~/.codex/skills/last30days/scripts/last30days.py --preflight

      - name: Run last30days Kosovo discovery
        shell: bash
        run: |
          set -euo pipefail
          DISCOVERY_DIR="$GITHUB_WORKSPACE/.last30days"
          mkdir -p "$DISCOVERY_DIR"
          cat > "$DISCOVERY_DIR/kosovo-news-plan.json" <<'JSON'
          {
            "intent": "breaking_news",
            "freshness_mode": "strict_recent",
            "cluster_mode": "story",
            "subqueries": [
              {
                "label": "kosovo-politics-security",
                "search_query": "Kosovo Serbia Pristina Kurti Osmani KFOR police court",
                "ranking_query": "Which current Kosovo politics, security, Serbia-relation, court, or public-debate stories have strong verification and Kosovo audience impact?",
                "sources": ["reddit", "x", "youtube", "tiktok", "instagram", "threads", "linkedin", "hackernews", "polymarket"],
                "weight": 1.0
              },
              {
                "label": "kosovo-economy-diaspora",
                "search_query": "Kosovo economy prices jobs energy business diaspora Albania",
                "ranking_query": "Which current Kosovo economy, consumer-price, job, business, energy, diaspora, or Albania-connected stories affect daily conversation?",
                "sources": ["reddit", "x", "youtube", "tiktok", "instagram", "threads", "linkedin", "polymarket"],
                "weight": 0.95
              },
              {
                "label": "sport-transfers",
                "search_query": "Fabrizio Romano 433 football transfer World Cup Kosovo Albania",
                "ranking_query": "Which current football transfers, scores, World Cup stories, Kosovo or Albanian athletes, and major sport moments are verified and high-interest for Kosovo readers?",
                "sources": ["x", "youtube", "tiktok", "instagram", "threads", "reddit"],
                "weight": 0.9
              },
              {
                "label": "showbiz-tech-drama",
                "search_query": "The Shade Room Complex Page Six Albanian celebrity The Rundown AI",
                "ranking_query": "Which current celebrity, music, culture, showbiz, or technology stories have real Kosovo or Albanian audience interest and can be verified beyond a social post?",
                "sources": ["x", "youtube", "tiktok", "instagram", "threads", "linkedin", "reddit"],
                "weight": 0.85
              }
            ]
          }
          JSON
          python3 ~/.codex/skills/last30days/scripts/last30days.py "Kosovo news" \
            --days 1 \
            --emit=compact \
            --search=reddit,x,youtube,tiktok,instagram,threads,pinterest,linkedin,hackernews,polymarket \
            --plan "$DISCOVERY_DIR/kosovo-news-plan.json" \
            --auto-resolve \
            --save-dir "$DISCOVERY_DIR" \
            --output "$DISCOVERY_DIR/kosovo-discovery.md"

      - name: Run current-day web and RSS discovery
        shell: bash
        run: |
          set -euo pipefail
          python scripts/cloud_news_discovery.py --output "$GITHUB_WORKSPACE/.last30days/web-discovery.md"

      - name: Install Codex CLI
        run: npm install -g @openai/codex

      - name: Configure Codex auth
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.codex
          if [ -z "${CODEX_AUTH_JSON_B64:-}" ]; then
            echo "Missing CODEX_AUTH_JSON_B64. This dedicated GitHub secret is required for the news account."
            exit 2
          fi
          unset OPENAI_API_KEY CODEX_ACCESS_TOKEN
          printf '%s' "$CODEX_AUTH_JSON_B64" | base64 -d > ~/.codex/auth.json
          chmod 600 ~/.codex/auth.json

      - name: Preflight repo environment
        run: |
          python scripts/codex_automation_support.py env-status
          python scripts/codex_automation_support.py github-auth

      - name: Patch email delivery behavior
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("scripts/codex_automation_support.py")
          text = path.read_text(encoding="utf-8")

          fallback_marker = "EMAIL Resend failed; trying Gmail SMTP fallback."
          if fallback_marker not in text:
              resend_only = '''    if resend_key:
                  return _send_resend_report(resend_key, recipient, subject, report_html)

              message = MIMEMultipart("alternative")'''.replace("              ", "")
              resend_fallback = '''    if resend_key:
                  resend_code = _send_resend_report(resend_key, recipient, subject, report_html)
                  if resend_code == 0:
                      return 0
                  if not user or not password:
                      return resend_code
                  print("EMAIL Resend failed; trying Gmail SMTP fallback.")

              message = MIMEMultipart("alternative")'''.replace("              ", "")
              if resend_only not in text:
                  raise SystemExit("Could not patch Resend fallback block")
              text = text.replace(resend_only, resend_fallback, 1)

          require_marker = "ERROR email report is required for this run."
          if require_marker not in text:
              warn_only = '''    if email_code != 0:
                  print("WARN SMTP email did not complete. Use the Outlook Email connector to send the report if available.")

              verify_code = verify_public_site(path)'''.replace("              ", "")
              require_email = '''    if email_code != 0:
                  print("WARN email report did not complete.")
                  if os.environ.get("REQUIRE_EMAIL_REPORT", "").strip().lower() in {"1", "true", "yes"}:
                      print("ERROR email report is required for this run.")
                      return 1

              verify_code = verify_public_site(path)'''.replace("              ", "")
              if warn_only not in text:
                  raise SystemExit("Could not patch required-email block")
              text = text.replace(warn_only, require_email, 1)

          path.write_text(text, encoding="utf-8")
          PY
          python -m py_compile scripts/codex_automation_support.py

      - name: Run Codex production news pipeline
        shell: bash
        run: |
          set -euo pipefail
          TARGET_BATCH_FILE="data/auto-articles/$(date -u +%Y-%m-%dT%H).json"
          export TARGET_BATCH_FILE
          echo "TARGET_BATCH_FILE=$TARGET_BATCH_FILE" >> "$GITHUB_ENV"
          echo "Target batch file: $TARGET_BATCH_FILE"
          LOCAL_DATE="$(date +%Y-%m-%d)"
          LOCAL_HOUR="$(date +%H)"
          if [ -n "${REQUESTED_CRON_SLOT_LABEL:-}" ]; then
            CRON_SLOT_LABEL="$REQUESTED_CRON_SLOT_LABEL"
          elif [ "${GITHUB_EVENT_NAME:-}" = "schedule" ]; then
            PLANNED_SLOT=7
            for SLOT in 7 9 11 13 15 17 19 21 23; do
              if [ "$((10#$LOCAL_HOUR))" -ge "$SLOT" ]; then
                PLANNED_SLOT="$SLOT"
              fi
            done
            printf -v CRON_SLOT_LABEL "%s %02d:00 Kosovo time" "$LOCAL_DATE" "$PLANNED_SLOT"
          else
            CRON_SLOT_LABEL="Manual run $(date +'%Y-%m-%d %H:%M Kosovo time')"
          fi
          export CRON_SLOT_LABEL
          echo "CRON_SLOT_LABEL=$CRON_SLOT_LABEL" >> "$GITHUB_ENV"
          echo "Cron slot label: $CRON_SLOT_LABEL"
          MODEL="${CODEX_MODEL:-gpt-5.6-luna}"
          if [ "$MODEL" = "gpt-5-codex" ]; then
            echo "gpt-5-codex is not supported with ChatGPT Codex auth; using gpt-5.4-mini."
            MODEL="gpt-5.4-mini"
          fi
          cat > /tmp/383-codex-news-prompt.md <<'PROMPT'
          Run the 383 Lajme GPT-5.6 Luna production news pipeline from this GitHub Actions cloud runner.

          Pull/rebase latest origin/main first. Read docs/383-cloud-news-automation.md and follow it exactly. Read .last30days/kosovo-discovery.md from the required one-day last30days social/listening run and .last30days/web-discovery.md from the current-day web/RSS discovery run. Then read the installed ~/.codex/skills/last30days/SKILL.md and use its actual research engine as the discovery/listening layer, not as an X/Twitter shortcut. The RSS file exists because optional last30days web planning can be unavailable; use its current leads alongside the social discovery. Run planned multi-source research queries for Kosovo breaking news, Kosovo-Serbia relations, Kosovo economy/everyday impact, Kosovo social/public debate, sport, technology, and showbiz. Use its TikTok, Instagram/Reels, YouTube, Threads, LinkedIn, Polymarket, GitHub, Reddit/HN, X, and web/regional/international discovery lanes. Filter all results to stories from today in Europe/Pristina time before publishing.

          Generate only today's Europe/Pristina news. Write 20 to 22 publishable articles per run. This is a hard batch requirement: 4 to 8 social-driven stories, no more than 2 X/Twitter-based stories, at least 12 non-social primary sources, and at least 8 source families. Continue targeted research across every beat until the batch is complete. Never invent, repeat, or use Kosovo competitors as main sources. Use SCRAPECREATORS_API_KEY and the actual last30days research output for TikTok, Instagram/Reels, YouTube, Threads, LinkedIn, Pinterest, Polymarket, GitHub, Reddit/HN, X, and web discovery. Never print secret values.

          Keep all quality rules from docs/383-cloud-news-automation.md: no old stories, no Kosovo competitor outlet as the main source, real image_url required, Serbian Kosovo-watch sources, Kosovo-audience interest, broad social/web/regional/international discovery, therundown.ai website-only for Teknologji, @theshaderoom/@complex/@pagesix for Showbiz, @433/Fabrizio Romano for sport, and broad social/web/Serbian/regional/institutional sources for Politike and Ekonomi.

          Optimize story selection for Kosovo readers. Prefer topics that people in Kosovo and Albanian-speaking audiences recognize, share, debate, or find dramatic: Kosovo/Serbia tension, politics, prices, jobs, visas, security, sports, diaspora, Albanian and Balkan celebrities/influencers, global celebrities known in Kosovo, football transfers, ridiculous public statements, social-media beefs, contradictions, scandals, and high-word-of-mouth drama. Do not invent drama; attribute dramatic claims clearly and keep legal/safety framing.

          Enforce source variety: do not use X/Twitter as the basis for more than 2 articles in a batch. Social-platform posts may be discovery signals, but no more than 8 of 20 articles may be social-driven. At least 12 articles must have a non-social primary source such as an official institution, company, court, club, specialist site, Serbian/regional outlet, or international outlet. Use at least 6 source families. If you cannot verify non-social sources for a candidate, skip it instead of filling the batch with X, Instagram, TikTok, YouTube, or Threads.

          For Teknologji, use therundown.ai website articles/newsletter pages only. Do not use The Rundown's X/Twitter account as the source for technology articles.

          If an article is based on a social media post/status/video/reel/thread, include social_platform, social_post_account, social_post_url, and social_post_basis in the JSON so the email report shows Social basis with the platform, account, and exact source post. Social posts are signals, not proof; verify or frame as attributed/disputed claims with safety caps.

          Write every article as original 383 Lajme Albanian newsroom copy, not a translation summary of another outlet. Do not open with or repeatedly say "Reddit says", "X says", or "Instagram posted" unless attribution is legally necessary to explain a claim. Non-social articles need at least 500 Albanian words in at least five paragraphs, with concrete context, what happened, why it matters for Kosovo readers, verified reactions or conflicting claims when relevant, and a clear current-status ending. Social-driven articles may be short dispatches, but must keep complete social metadata and accurate attribution. Set reading_time to ceil(body word count / 200), so it reflects real reading time rather than defaulting to 1 minute.

          The reader must not see source names, platform names, or account names in the title or excerpt. Do not write titles such as "Fabrizio Romano says" or "Instagram reports". Turn verified source material into a clear, original Albanian newsroom headline with a factual hook and a compelling reason to open the article. Keep `source`, URL, and required `social_*` fields only as internal metadata; use direct attribution in the body only when legally or factually necessary.

          Before adding any candidate, fetch and inspect its image. Publish only if image_url is public, unique in batch, decodes successfully, and is at least 1200x675 pixels. Record actual image_width and image_height in the JSON. Reject missing, broken, low-resolution, reused, logo-only, or unrelated images. Do not use stock placeholders.

          Every JSON article must include all required production fields: id, slug, url, dispatch, title, excerpt, body, source, source_flag, source_bias, tone, category, published_at, reading_time, featured, engagement_score, score_reason, score_breakdown, score_formula, image_url, image_width, image_height, and created_at. `score_breakdown` is mandatory and must be an object with numeric 1-10 values for relevance, urgency, public_impact, local_depth, controversy_interest, credibility, corroboration, and editorial_safety. Set `engagement_score` to the weighted result rounded to one decimal: relevance 22%, urgency 14%, public_impact 16%, local_depth 10%, controversy_interest 10%, credibility 16%, corroboration 8%, editorial_safety 4%. Include a readable `score_formula` that states the same weights and result. This is required even for social dispatches.

          Create the new JSON batch at TARGET_BATCH_FILE when that environment variable is present; otherwise create data/auto-articles/YYYY-MM-DDTHH.json using UTC HH 00-23. Preserve CRON_SLOT_LABEL so the email report shows which scheduled Kosovo-time slot produced the batch. Never write an empty JSON array: use the verified web/RSS leads and social discovery to make at least one real article, or leave no batch file and explain the blocking evidence. Your responsibility ends after writing the complete JSON batch. Do not run validate, build, publish, deploy, verify, send-report, or finalize yourself. The workflow runs those required post-generation steps and owns the one email report.
          PROMPT
          codex exec --cd "$GITHUB_WORKSPACE" --dangerously-bypass-approvals-and-sandbox -m "$MODEL" - < /tmp/383-codex-news-prompt.md

          if python3 - "$TARGET_BATCH_FILE" <<'PY'
          import json
          import sys
          from pathlib import Path

          try:
              batch = json.loads(Path(sys.argv[1]).read_text(encoding="utf-8"))
          except (FileNotFoundError, json.JSONDecodeError):
              raise SystemExit(0)
          raise SystemExit(0 if isinstance(batch, list) and not batch else 1)
          PY
          then
            echo "Codex left a missing or empty batch; retrying once with the current-day lead file."
            rm -f "$TARGET_BATCH_FILE"
            cat > /tmp/383-codex-empty-batch-retry.md <<'PROMPT'
            The first 383 Lajme cloud generation pass produced no candidates. Recover this run now.

            Read docs/383-cloud-news-automation.md, .last30days/kosovo-discovery.md, and .last30days/web-discovery.md. The latter has current-day non-competitor web/RSS leads, including regional, Serbian Kosovo-watch, sport, and showbiz lanes. Open the original publisher links, verify publication date and facts, inspect the actual image, and write at least one complete, original Albanian 383 Lajme article that passes every documented quality rule. Prefer Kosovo relevance, but current high-interest sport or showbiz is valid when a Kosovo-specific source has no eligible story.

            Write the batch only to $TARGET_BATCH_FILE. Never write an empty JSON array. Do not run validation, build, publish, deploy, verification, email, or finalize; this workflow owns those steps.
          PROMPT
            codex exec --cd "$GITHUB_WORKSPACE" --dangerously-bypass-approvals-and-sandbox -m "$MODEL" - < /tmp/383-codex-empty-batch-retry.md
          fi

          python scripts/codex_automation_support.py normalize --file "$TARGET_BATCH_FILE"
          if ! python scripts/codex_automation_support.py validate --file "$TARGET_BATCH_FILE" > /tmp/383-batch-validation.log 2>&1 || ! python scripts/validate_source_mix.py --file "$TARGET_BATCH_FILE" >> /tmp/383-batch-validation.log 2>&1; then
            cat > /tmp/383-codex-batch-repair.md <<'PROMPT'
            Repair the existing JSON batch at $TARGET_BATCH_FILE. Do not create a helper script, placeholder, stock image, logo image, or fabricated story.

            Read /tmp/383-batch-validation.log. Fix every reported issue in the JSON while preserving 20 to 22 independently verified current-day stories: replace duplicate URLs with distinct original article URLs, remove source/platform/account names from title and excerpt, use only accepted categories, and keep accurate image_width/image_height for the exact image_url. Use the existing discovery files and original publisher pages for replacements. Do not publish or finalize.

            Before ending, run exactly:
            python scripts/codex_automation_support.py normalize --file "$TARGET_BATCH_FILE"
            python scripts/codex_automation_support.py validate --file "$TARGET_BATCH_FILE"
            python scripts/validate_source_mix.py --file "$TARGET_BATCH_FILE"
            Do not stop until all three commands pass.
          PROMPT
            codex exec --cd "$GITHUB_WORKSPACE" --dangerously-bypass-approvals-and-sandbox -m "$MODEL" - < /tmp/383-codex-batch-repair.md
          fi

      - name: Validate, publish, and email generated batch
        shell: bash
        run: |
          set -euo pipefail
          : "${TARGET_BATCH_FILE:?Codex did not provide TARGET_BATCH_FILE}"
          : "${CRON_SLOT_LABEL:?Codex did not provide CRON_SLOT_LABEL}"
          if [ ! -f "$TARGET_BATCH_FILE" ]; then
            echo "ERROR Codex did not create the required 20-story batch: $TARGET_BATCH_FILE"
            exit 1
          fi
          python scripts/codex_automation_support.py normalize --file "$TARGET_BATCH_FILE"
          python scripts/codex_automation_support.py validate --file "$TARGET_BATCH_FILE"
          python scripts/validate_source_mix.py --file "$TARGET_BATCH_FILE"
          npm run build
          python scripts/codex_automation_support.py finalize --file "$TARGET_BATCH_FILE"

      - name: Notify failure by email
        if: failure()
        shell: bash
        run: |
          python scripts/codex_automation_support.py send-status-report \
            --message "Pipelinei cloud dështoi para publikimit. Hapni GitHub Actions për detajin e hapit që dështoi."
