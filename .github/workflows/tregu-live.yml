# Pings the tregu odds-refresh endpoint every ~5 minutes so breaking news
# moves market odds near-real-time. Vercel Hobby cron only fires daily —
# GitHub Actions provides the high-frequency loop for free.
#
# Setup (one-time): repo → Settings → Secrets and variables → Actions →
# add secret CRON_SECRET with the same value as the Vercel env var.
name: Tregu Live Refresh

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Refresh market odds from news
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "CRON_SECRET repo secret is not set — skipping." >&2
            exit 1
          fi
          curl -fsS --max-time 120 \
            -H "Authorization: Bearer $CRON_SECRET" \
            "https://383lajme.vercel.app/api/cron/update-markets" \
            | head -c 2000
