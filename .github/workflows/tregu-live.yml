# BACKUP pinger only. The primary 5-minute loop runs on cron-job.org
# (exact timing, free) hitting the same endpoint with the same Bearer secret.
# GitHub cron drifts/skips under load, so it's demoted to a 30-min safety net —
# if cron-job.org ever lapses, odds still refresh at least twice an hour.
#
# Setup (one-time): repo → Settings → Secrets and variables → Actions →
# add secret CRON_SECRET with the same value as the Vercel env var.
name: Tregu Live Refresh (backup)

on:
  schedule:
    - cron: "7,37 * * * *"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Refresh market odds from news
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "CRON_SECRET repo secret is not set — skipping." >&2
            exit 1
          fi
          curl -fsS --max-time 120 \
            -H "Authorization: Bearer $CRON_SECRET" \
            "https://383lajme.vercel.app/api/cron/update-markets" \
            | head -c 2000
